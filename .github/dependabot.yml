version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Manila"
    open-pull-requests-limit: 5
    groups:
      next-runtime:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      security-overrides:
        patterns:
          - "@swc/helpers"
          - "brace-expansion"
          - "devalue"
          - "tar"
          - "ws"
          - "sqlite3"
          - "node-gyp"
          - "make-fetch-happen"
          - "http-proxy-agent"
          - "@tootallnate/once"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Manila"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore"
      include: "scope"
